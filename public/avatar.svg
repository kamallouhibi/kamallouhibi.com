<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g clip-path="url(#circle)" stroke="rgba(255,255,255,0.04)" stroke-width="1" fill="none">
    <line x1="0" y1="80"  x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80"  y1="0" x2="80"  y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>

  <!-- Glow -->
  <circle cx="200" cy="200" r="200" fill="url(#glow)"/>

  <!-- Accent ring -->
  <circle cx="200" cy="200" r="172" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Monogram -->
  <text
    x="200" y="248"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="152"
    font-weight="800"
    fill="rgba(255,255,255,0.95)"
    text-anchor="middle"
    letter-spacing="-6"
  >KL</text>

  <!-- Bottom label -->
  <text
    x="200" y="308"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="18"
    font-weight="500"
    fill="rgba(255,255,255,0.35)"
    text-anchor="middle"
    letter-spacing="3"
  >KAMAL</text>
</svg>
